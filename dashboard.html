<!DOCTYPE html>
<html>
<head>
  <title>HR Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-body">

<header>
  <h1>Welcome to HR Policy Portal</h1>
  <button class ="dashboard-button" onclick="logout()">Logout</button>
</header>

<div class="grid">

  <div class="card" onclick="openPolicy('leave')">📄 Leave Policy</div>
  <div class="card">✈️ Travel Policy</div>
  <div class="card">💰 Reimbursement</div>
  <div class="card">🏥 Mediclaim</div>
  <div class="card">📘 Code of Conduct</div>
  <div class="card">📊 HR Guidelines</div>

</div>

<!-- Netlify Identity -->
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script src="app.js"></script>

<script>
// protect page
const netlifyIdentity = window.netlifyIdentity;
netlifyIdentity.init();

netlifyIdentity.on("init", user => {
  if (!user) {
    window.location.href = "index.html";
  }
});
</script>

</body>
</html>
